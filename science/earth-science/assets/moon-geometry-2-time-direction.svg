<svg viewBox="0 0 640 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
<defs>
  <marker id="arrR" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#FBBF24"/>
  </marker>
  <marker id="arrL" viewBox="0 0 8 8" refX="1" refY="4" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M8,0 L0,4 L8,8 Z" fill="#FBBF24"/>
  </marker>
</defs>

<text x="320" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#F1F5F9">角端連線找南北方向</text>
<text x="320" y="36" text-anchor="middle" font-size="11" fill="#6B7280">兩個角端連成一線，大致平行南北方向（北半球中緯度）</text>

<!-- Sky background -->
<rect x="0" y="45" width="640" height="280" fill="#060e1e"/>
<!-- Stars -->
<circle cx="60" cy="72" r="1.1" fill="#fff" opacity=".7"/>
<circle cx="190" cy="60" r="1" fill="#fff" opacity=".6"/>
<circle cx="320" cy="80" r="1.2" fill="#fff" opacity=".5"/>
<circle cx="450" cy="62" r="1" fill="#fff" opacity=".7"/>
<circle cx="580" cy="74" r="1.1" fill="#fff" opacity=".6"/>
<circle cx="105" cy="130" r="0.9" fill="#fff" opacity=".5"/>
<circle cx="535" cy="118" r="0.9" fill="#fff" opacity=".5"/>
<!-- Ground -->
<rect x="0" y="325" width="640" height="15" fill="#1c1c0e"/>
<line x1="0" y1="325" x2="640" y2="325" stroke="#4a5535" stroke-width="2"/>

<!-- Direction banner -->
<text x="320" y="342" text-anchor="middle" font-size="11" fill="#6B7280">← 東  ·  面南而立  ·  西 →</text>

<!-- Faint center meridian (due south) -->
<line x1="320" y1="75" x2="320" y2="325" stroke="#fff" stroke-width="1" stroke-dasharray="3,10" opacity=".07"/>

<!-- ════════════════════════════════════════════════════ -->
<!-- 下弦月 (LEFT: SE morning sky) cx=170, cy=182, r=72  -->
<!-- Left half lit; lit faces EAST (←); sun is to the LEFT -->
<!-- ════════════════════════════════════════════════════ -->
<circle cx="170" cy="182" r="72" fill="#0d0d2a"/>
<!-- Left half lit: CCW arc from top → left → bottom + close with straight line -->
<path d="M170,110 A72,72 0 0,0 170,254 Z" fill="#FFF9DC"/>
<circle cx="170" cy="182" r="72" fill="none" stroke="#D97706" stroke-width="2"/>
<!-- Terminator: straight line at x=170 -->
<line x1="170" y1="110" x2="170" y2="254" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4"/>
<!-- 角端 dots -->
<circle cx="170" cy="110" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<circle cx="170" cy="254" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<!-- Connecting line extended N and S -->
<line x1="170" y1="110" x2="170" y2="80" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,4" opacity=".7"/>
<line x1="170" y1="254" x2="170" y2="290" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,4" opacity=".7"/>
<!-- N / S labels -->
<text x="170" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#CBD5E1">北 N</text>
<text x="170" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#CBD5E1">南 S</text>
<!-- Sun direction arrow ← (toward east/left) -->
<line x1="155" y1="182" x2="60" y2="182" stroke="#FBBF24" stroke-width="1.8" marker-end="url(#arrL)"/>
<text x="52" y="175" text-anchor="middle" font-size="10" fill="#D97706">太陽</text>
<text x="52" y="187" text-anchor="middle" font-size="10" fill="#D97706">（東）</text>
<!-- Moon name + time context -->
<text x="170" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#93C5FD">下弦月</text>
<text x="170" y="331" text-anchor="middle" font-size="10" fill="#6B7280">下半夜，偏東南方</text>

<!-- ════════════════════════════════════════════════════ -->
<!-- 上弦月 (RIGHT: SW evening sky) cx=470, cy=182, r=72 -->
<!-- Right half lit; lit faces WEST (→); sun is to the RIGHT -->
<!-- ════════════════════════════════════════════════════ -->
<circle cx="470" cy="182" r="72" fill="#0d0d2a"/>
<!-- Right half lit: CW arc from top → right → bottom + close -->
<path d="M470,110 A72,72 0 0,1 470,254 Z" fill="#FFF9DC"/>
<circle cx="470" cy="182" r="72" fill="none" stroke="#D97706" stroke-width="2"/>
<!-- Terminator: straight line at x=470 -->
<line x1="470" y1="110" x2="470" y2="254" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4"/>
<!-- 角端 dots -->
<circle cx="470" cy="110" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<circle cx="470" cy="254" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<!-- Connecting line extended N and S -->
<line x1="470" y1="110" x2="470" y2="80" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,4" opacity=".7"/>
<line x1="470" y1="254" x2="470" y2="290" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,4" opacity=".7"/>
<!-- N / S labels -->
<text x="470" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#CBD5E1">北 N</text>
<text x="470" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#CBD5E1">南 S</text>
<!-- Sun direction arrow → (toward west/right) -->
<line x1="485" y1="182" x2="580" y2="182" stroke="#FBBF24" stroke-width="1.8" marker-end="url(#arrR)"/>
<text x="590" y="175" text-anchor="middle" font-size="10" fill="#D97706">太陽</text>
<text x="590" y="187" text-anchor="middle" font-size="10" fill="#D97706">（西）</text>
<!-- Moon name + time context -->
<text x="470" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#93C5FD">上弦月</text>
<text x="470" y="331" text-anchor="middle" font-size="10" fill="#6B7280">上半夜，偏西南方</text>

<!-- Center legend -->
<rect x="268" y="148" width="104" height="68" rx="6" fill="#0a1628" stroke="#374151" stroke-width="1"/>
<line x1="282" y1="162" x2="282" y2="202" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="3,3" opacity=".8"/>
<circle cx="282" cy="162" r="3.5" fill="#FBBF24"/>
<circle cx="282" cy="202" r="3.5" fill="#FBBF24"/>
<text x="292" y="159" font-size="10" fill="#FBBF24">角端</text>
<text x="292" y="174" font-size="10" fill="#CBD5E1">連線 ≈</text>
<text x="292" y="188" font-size="10" fill="#CBD5E1">南北方向</text>
<line x1="292" y1="200" x2="352" y2="200" stroke="#CBD5E1" stroke-width="1" opacity=".5"/>
<text x="292" y="212" font-size="9" fill="#6B7280">月亮愈低愈準</text>

<!-- Bottom note -->
<rect x="8" y="358" width="624" height="34" rx="5" fill="#0f2040" stroke="#1e3a5f" stroke-width="1"/>
<text x="320" y="371" text-anchor="middle" font-size="10.5" fill="#FFF9DC">月亮愈靠近地平線（偏低），角端連線偏差愈小，南北估算愈準</text>
<text x="320" y="386" text-anchor="middle" font-size="10.5" fill="#94A3B8">月亮在頭頂時連線偏差最大；滿月無角端，不適用本方法</text>
</svg>
