<svg viewBox="0 0 640 518" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <title>月亮在天空的位置估算時間（面南而立）</title>

  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#F1F5F9">用月亮在天空的位置估算時間</text>
  <text x="320" y="38" text-anchor="middle" font-size="11" fill="#6B7280">以盈凸月（夾角 120°）為例　（面南而立：左東右西｜北半球中緯度）</text>

  <!-- Sky -->
  <rect x="0" y="47" width="640" height="278" fill="#060e1e"/>
  <circle cx="50" cy="75" r="1.2" fill="#fff" opacity=".7"/>
  <circle cx="155" cy="62" r="1" fill="#fff" opacity=".6"/>
  <circle cx="250" cy="84" r="1.3" fill="#fff" opacity=".8"/>
  <circle cx="415" cy="68" r="1.1" fill="#fff" opacity=".7"/>
  <circle cx="525" cy="85" r="1" fill="#fff" opacity=".6"/>
  <circle cx="598" cy="60" r="1.2" fill="#fff" opacity=".9"/>
  <circle cx="375" cy="108" r="0.9" fill="#fff" opacity=".5"/>
  <circle cx="215" cy="130" r="1.1" fill="#fff" opacity=".6"/>
  <circle cx="560" cy="145" r="0.8" fill="#fff" opacity=".5"/>
  <circle cx="82" cy="138" r="1" fill="#fff" opacity=".6"/>
  <circle cx="290" cy="70" r="1" fill="#fff" opacity=".7"/>
  <rect x="0" y="325" width="640" height="20" fill="#1c1c0e"/>
  <line x1="0" y1="325" x2="640" y2="325" stroke="#4a5535" stroke-width="2"/>

  <!-- Direction labels: facing south → East LEFT, South CENTER, West RIGHT -->
  <text x="18" y="340" font-size="11" fill="#9CA3AF">東 E ↑ 升起</text>
  <text x="302" y="340" font-size="11" fill="#9CA3AF">南 S（最高點）</text>
  <text x="558" y="340" font-size="11" fill="#9CA3AF">西 W 落下 ↓</text>

  <!-- Faint meridian -->
  <line x1="320" y1="95" x2="320" y2="325" stroke="#fff" stroke-width="1" stroke-dasharray="3,8" opacity=".1"/>

  <!-- Moon arc: 18:00 at y=235 (same height as 22:00) -->
  <path d="M120,235 C200,190 270,153 320,148 C378,143 432,192 480,235 C510,258 532,280 555,305 L572,323"
        fill="none" stroke="#FFF9DC" stroke-width="1.5" stroke-dasharray="7,6" opacity=".4"/>

  <!-- 18:00: (120,235), r=13, waxing gibbous (dark LEFT, lit RIGHT) -->
  <circle cx="120" cy="235" r="13" fill="#0d0d2a"/>
  <path d="M120,222 A13,13 0 0,1 120,248 A6.5,13 0 0,1 120,222 Z" fill="#FFF9DC"/>
  <circle cx="120" cy="235" r="13" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
  <path d="M120,222 A6.5,13 0 0,0 120,248" fill="none" stroke="#60A5FA" stroke-width="1.8" stroke-dasharray="3,2"/>
  <text x="138" y="232" font-size="11" font-weight="700" fill="#FFF9DC">約 18:00</text>
  <text x="138" y="246" font-size="10" fill="#9CA3AF">偏東，升起中</text>

  <!-- 20:00: (320,148), r=16, HIGHLIGHTED -->
  <circle cx="320" cy="148" r="16" fill="#0d0d2a"/>
  <path d="M320,132 A16,16 0 0,1 320,164 A8,16 0 0,1 320,132 Z" fill="#FFF9DC"/>
  <circle cx="320" cy="148" r="16" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <path d="M320,132 A8,16 0 0,0 320,164" fill="none" stroke="#60A5FA" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="228" y="142" font-size="12" font-weight="700" fill="#F59E0B">約 20:00</text>
  <text x="228" y="157" font-size="10" fill="#9CA3AF">最高點（偏南）</text>
  <!-- Calculation box -->
  <rect x="345" y="112" width="182" height="58" rx="6" fill="#0f2a04" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="436" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#4ADE80">夾角 120° 的最高點時間</text>
  <text x="436" y="145" text-anchor="middle" font-size="12" fill="#BBF7D0">12:00 + 120°÷15° = 20:00</text>
  <text x="436" y="161" text-anchor="middle" font-size="10" fill="#86EFAC">（正午後 8 小時）</text>
  <line x1="345" y1="139" x2="337" y2="148" stroke="#4ADE80" stroke-width="1.2" opacity=".8"/>

  <!-- 22:00: (480,235), r=13 -->
  <circle cx="480" cy="235" r="13" fill="#0d0d2a"/>
  <path d="M480,222 A13,13 0 0,1 480,248 A6.5,13 0 0,1 480,222 Z" fill="#FFF9DC"/>
  <circle cx="480" cy="235" r="13" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
  <path d="M480,222 A6.5,13 0 0,0 480,248" fill="none" stroke="#60A5FA" stroke-width="1.8" stroke-dasharray="3,2"/>
  <text x="480" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF9DC">約 22:00</text>
  <text x="480" y="219" text-anchor="middle" font-size="10" fill="#9CA3AF">偏西南，降中</text>

  <!-- 00:00: (555,305), r=13 -->
  <circle cx="555" cy="305" r="13" fill="#0d0d2a"/>
  <path d="M555,292 A13,13 0 0,1 555,318 A6.5,13 0 0,1 555,292 Z" fill="#FFF9DC"/>
  <circle cx="555" cy="305" r="13" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
  <path d="M555,292 A6.5,13 0 0,0 555,318" fill="none" stroke="#60A5FA" stroke-width="1.8" stroke-dasharray="3,2"/>
  <text x="572" y="300" font-size="11" font-weight="700" fill="#FFF9DC">約 00:00</text>
  <text x="572" y="314" font-size="10" fill="#9CA3AF">偏西低空</text>

  <text x="606" y="320" font-size="10" fill="#6B7280">02:00↓</text>

  <!-- TABLE -->
  <rect x="10" y="348" width="620" height="132" rx="4" fill="#0a1628"/>
  <rect x="10" y="348" width="620" height="22" rx="4" fill="#1E3A5F"/>
  <rect x="10" y="392" width="620" height="22" fill="#0f2a04"/>
  <line x1="188" y1="348" x2="188" y2="480" stroke="#374151" stroke-width="1"/>
  <line x1="320" y1="348" x2="320" y2="480" stroke="#374151" stroke-width="1"/>
  <line x1="452" y1="348" x2="452" y2="480" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="370" x2="630" y2="370" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="392" x2="630" y2="392" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="414" x2="630" y2="414" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="436" x2="630" y2="436" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="458" x2="630" y2="458" stroke="#374151" stroke-width="1"/>
  <rect x="10" y="348" width="620" height="132" rx="4" fill="none" stroke="#374151" stroke-width="1"/>

  <text x="99" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#93C5FD">月相（夾角）</text>
  <text x="254" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#93C5FD">升起（偏東）</text>
  <text x="386" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#93C5FD">最高點（偏南）</text>
  <text x="541" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#93C5FD">落下（偏西）</text>

  <text x="99" y="384" text-anchor="middle" font-size="11" fill="#CBD5E1">上弦月  90°</text>
  <text x="254" y="384" text-anchor="middle" font-size="11" fill="#94A3B8">約 12:00</text>
  <text x="386" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">約 18:00</text>
  <text x="541" y="384" text-anchor="middle" font-size="11" fill="#94A3B8">約 00:00</text>

  <text x="99" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#4ADE80">盈凸月  120° ★</text>
  <text x="254" y="406" text-anchor="middle" font-size="11" fill="#94A3B8">約 14:00</text>
  <text x="386" y="406" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">約 20:00</text>
  <text x="541" y="406" text-anchor="middle" font-size="11" fill="#94A3B8">約 02:00</text>

  <text x="99" y="428" text-anchor="middle" font-size="11" fill="#CBD5E1">滿月  180°</text>
  <text x="254" y="428" text-anchor="middle" font-size="11" fill="#94A3B8">約 18:00</text>
  <text x="386" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">約 00:00</text>
  <text x="541" y="428" text-anchor="middle" font-size="11" fill="#94A3B8">約 06:00</text>

  <text x="99" y="450" text-anchor="middle" font-size="11" fill="#CBD5E1">虧凸月  240°</text>
  <text x="254" y="450" text-anchor="middle" font-size="11" fill="#94A3B8">約 22:00</text>
  <text x="386" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">約 04:00</text>
  <text x="541" y="450" text-anchor="middle" font-size="11" fill="#94A3B8">約 10:00</text>

  <text x="99" y="472" text-anchor="middle" font-size="11" fill="#CBD5E1">下弦月  270°</text>
  <text x="254" y="472" text-anchor="middle" font-size="11" fill="#94A3B8">約 00:00</text>
  <text x="386" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">約 06:00</text>
  <text x="541" y="472" text-anchor="middle" font-size="11" fill="#94A3B8">約 12:00</text>

  <!-- Formula bar -->
  <rect x="10" y="487" width="620" height="24" rx="6" fill="#0f2040" stroke="#1e3a5f" stroke-width="1"/>
  <text x="320" y="503" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF9DC">最高點時間 = 12:00 + 夾角÷15° ｜ 月偏東（升）→ 時間更早 ｜ 月偏西（降）→ 時間更晚 ｜ 每 15° ≈ 1 小時</text>
</svg>
