<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#FBBF24"/>
  </marker>
</defs>

<text x="205" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#F1F5F9">月亮找太陽：用角端畫垂線</text>
<text x="205" y="36" text-anchor="middle" font-size="11" fill="#6B7280">角端連線的垂直方向 → 太陽大概位置</text>

<!-- MAIN MOON: cx=210, cy=215, r=88; 25% lit crescent (right), kx=44, terminator at x=254 -->
<circle cx="210" cy="215" r="88" fill="#0d0d2a"/>
<path d="M210,127 A88,88 0 0,1 210,303 A44,88 0 0,0 210,127 Z" fill="#FFF9DC"/>
<circle cx="210" cy="215" r="88" fill="none" stroke="#D97706" stroke-width="2.5"/>
<path d="M210,127 A44,88 0 0,1 210,303" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="8,4"/>
<circle cx="210" cy="127" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<circle cx="210" cy="303" r="5" fill="#FBBF24" stroke="#0d0d2a" stroke-width="1.5"/>
<line x1="210" y1="127" x2="210" y2="303" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,5" opacity=".6"/>
<line x1="210" y1="215" x2="348" y2="215" stroke="#FBBF24" stroke-width="2" marker-end="url(#arr)"/>
<text x="354" y="211" font-size="11" font-weight="700" fill="#FBBF24">太陽</text>
<text x="354" y="224" font-size="10" fill="#9CA3AF">方向</text>

<!-- LEFT LABELS -->
<rect x="8" y="48" width="96" height="44" rx="4" fill="rgba(251,191,36,.07)" stroke="#FBBF24" stroke-width="1"/>
<text x="56" y="67" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">角端</text>
<text x="56" y="81" text-anchor="middle" font-size="10" fill="#9CA3AF">外弧∩內弧交點</text>
<line x1="104" y1="68" x2="203" y2="130" stroke="#FBBF24" stroke-width="1" stroke-dasharray="3,3" opacity=".7"/>

<rect x="8" y="152" width="96" height="44" rx="4" fill="rgba(217,119,6,.07)" stroke="#D97706" stroke-width="1"/>
<text x="56" y="171" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">外弧</text>
<text x="56" y="185" text-anchor="middle" font-size="10" fill="#9CA3AF">月亮輪廓圓弧</text>
<!-- leader to outer circle left edge at y=171: x=210-sqrt(88^2-44^2)=210-76=134 -->
<line x1="104" y1="171" x2="134" y2="171" stroke="#D97706" stroke-width="1" stroke-dasharray="3,3" opacity=".7"/>

<rect x="8" y="248" width="96" height="44" rx="4" fill="rgba(59,130,246,.07)" stroke="#3B82F6" stroke-width="1"/>
<text x="56" y="267" text-anchor="middle" font-size="12" font-weight="700" fill="#3B82F6">內弧</text>
<text x="56" y="281" text-anchor="middle" font-size="10" fill="#9CA3AF">亮暗交界弧線</text>
<!-- leader close to terminator at x≈252, y≈228 -->
<line x1="104" y1="270" x2="248" y2="230" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3" opacity=".7"/>

<text x="210" y="328" text-anchor="middle" font-size="11" fill="#CBD5E1">連線 ≈ 南北方向</text>

<!-- DIVIDER -->
<line x1="403" y1="45" x2="403" y2="432" stroke="#374151" stroke-width="1" opacity=".4"/>
<text x="517" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#9CA3AF">各月相示例</text>

<!-- Column headings -->
<text x="453" y="76" text-anchor="middle" font-size="10" fill="#9CA3AF">眉月</text>
<text x="563" y="76" text-anchor="middle" font-size="10" fill="#9CA3AF">凸月</text>

<!-- 眉月 (10% lit, right): (453,113) r=30, kx=24 -->
<circle cx="453" cy="113" r="30" fill="#0d0d2a"/>
<path d="M453,83 A30,30 0 0,1 453,143 A24,30 0 0,0 453,83 Z" fill="#FFF9DC"/>
<circle cx="453" cy="113" r="30" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
<path d="M453,83 A24,30 0 0,1 453,143" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity=".8"/>
<circle cx="453" cy="83" r="3.5" fill="#FBBF24"/>
<circle cx="453" cy="143" r="3.5" fill="#FBBF24"/>
<line x1="453" y1="83" x2="453" y2="143" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,4" opacity=".5"/>

<!-- 凸月 (75% lit, dark left): (563,113) r=30, kx=15 -->
<circle cx="563" cy="113" r="30" fill="#0d0d2a"/>
<path d="M563,83 A30,30 0 0,1 563,143 A15,30 0 0,1 563,83 Z" fill="#FFF9DC"/>
<circle cx="563" cy="113" r="30" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
<path d="M563,83 A15,30 0 0,0 563,143" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity=".8"/>
<circle cx="563" cy="83" r="3.5" fill="#FBBF24"/>
<circle cx="563" cy="143" r="3.5" fill="#FBBF24"/>
<line x1="563" y1="83" x2="563" y2="143" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,4" opacity=".5"/>

<!-- Row 2 headings -->
<text x="453" y="232" text-anchor="middle" font-size="10" fill="#9CA3AF">弦月</text>
<text x="563" y="232" text-anchor="middle" font-size="10" fill="#9CA3AF">滿月</text>

<!-- 弦月 (50% lit, right half): (453,270) r=30 -->
<circle cx="453" cy="270" r="30" fill="#0d0d2a"/>
<path d="M453,240 A30,30 0 0,1 453,300 Z" fill="#FFF9DC"/>
<circle cx="453" cy="270" r="30" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
<line x1="453" y1="240" x2="453" y2="300" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity=".8"/>
<circle cx="453" cy="240" r="3.5" fill="#FBBF24"/>
<circle cx="453" cy="300" r="3.5" fill="#FBBF24"/>
<line x1="453" y1="240" x2="453" y2="300" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,4" opacity=".5"/>

<!-- 滿月 (100% lit): (563,270) r=28 -->
<circle cx="563" cy="270" r="28" fill="#FFF9DC"/>
<circle cx="563" cy="270" r="28" fill="none" stroke="#D97706" stroke-width="1.5" opacity=".8"/>
<text x="563" y="310" text-anchor="middle" font-size="9" fill="#6B7280">無角端</text>
<text x="563" y="322" text-anchor="middle" font-size="9" fill="#6B7280">用反向法</text>

<!-- BOTTOM NOTE (height=34 fits 2 lines) -->
<rect x="8" y="442" width="624" height="34" rx="5" fill="#0f2040" stroke="#1e3a5f" stroke-width="1"/>
<text x="320" y="455" text-anchor="middle" font-size="10.5" fill="#FFF9DC">新月（看不見）= 唯一完全失效的情況</text>
<text x="320" y="470" text-anchor="middle" font-size="10.5" fill="#86EFAC">眉月、弦月、凸月、滿月均可用本方法估太陽方向</text>
</svg>
